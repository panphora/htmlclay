name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (without v prefix, e.g. 1.2.3)"
        required: true
        type: string

jobs:
  # ── Test gate: nothing is released unless the suite passes on every OS ──
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test ./... -count=1
        env:
          CGO_ENABLED: ${{ runner.os == 'macOS' && '1' || '0' }}

  # ── Linux: build binary, package as tar.gz ──
  build-linux:
    needs: test
    strategy:
      matrix:
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X main.version=${{ inputs.version }}" -o htmlclay .
        env:
          CGO_ENABLED: "0"

      - name: Package
        run: |
          stage=htmlclay-linux-${{ matrix.goarch }}
          mkdir -p "$stage"
          cp htmlclay "$stage/"
          cp dist/linux/htmlclay.desktop \
             dist/linux/htmlclay-mime.xml \
             dist/linux/htmlclay.png \
             dist/linux/htmlclay.svg \
             dist/linux/install-icon.sh \
             dist/linux/install.sh \
             "$stage/"
          chmod +x "$stage/install.sh" "$stage/install-icon.sh"
          tar czf "$stage.tar.gz" -C "$stage" .

      - uses: actions/upload-artifact@v4
        with:
          name: htmlclay-linux-${{ matrix.goarch }}.tar.gz
          path: htmlclay-linux-${{ matrix.goarch }}.tar.gz

  # ── Windows: build, sign with Azure Trusted Signing ──
  build-windows:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Embed icon resource
        run: |
          $nums = [regex]::Matches("${{ inputs.version }}", '\d+') | ForEach-Object { $_.Value }
          $maj = if ($nums.Count -gt 0) { $nums[0] } else { "0" }
          $min = if ($nums.Count -gt 1) { $nums[1] } else { "0" }
          $pat = if ($nums.Count -gt 2) { $nums[2] } else { "0" }
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1 `
            -64 -o resource_windows_amd64.syso `
            -icon dist/windows/htmlclay.ico `
            -file-version "${{ inputs.version }}" -product-version "${{ inputs.version }}" `
            -ver-major $maj -ver-minor $min -ver-patch $pat `
            -product-ver-major $maj -product-ver-minor $min -product-ver-patch $pat `
            dist/windows/versioninfo.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Build
        run: |
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags="-s -w -X main.version=${{ inputs.version }}" -o htmlclay.exe .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Install TrustedSigning module
        run: Install-Module -Name TrustedSigning -Force -Scope CurrentUser -AcceptLicense
        shell: pwsh

      - name: Sign with Azure Trusted Signing
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          Invoke-TrustedSigning `
            -Endpoint "https://eus.codesigning.azure.net" `
            -CodeSigningAccountName "Hyperclay" `
            -CertificateProfileName "HyperclayLocalPublicCertProfile" `
            -Files "htmlclay.exe" `
            -FileDigest SHA256 `
            -Verbose
        shell: pwsh

      - name: Verify signature
        run: |
          $sig = Get-AuthenticodeSignature "htmlclay.exe"
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne "Valid") {
            Write-Error "Signature verification failed!"
            exit 1
          }
        shell: pwsh

      - name: Package
        run: Compress-Archive -Path htmlclay.exe,dist\windows\register.bat -DestinationPath htmlclay-windows-amd64.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: htmlclay-windows-amd64.zip
          path: htmlclay-windows-amd64.zip

  # ── macOS: build universal binary, sign + notarize with Apple ──
  build-macos:
    needs: test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Import Developer ID certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPW="$(openssl rand -base64 24)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KPW" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign & notarize (universal)
        env:
          VERSION: ${{ inputs.version }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: bash dist/macos/build.sh --universal

      - uses: actions/upload-artifact@v4
        with:
          name: HTMLClay-universal.dmg
          path: HTMLClay-*.dmg

  # ── Upload to R2 ──
  upload:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          pip install awscli --quiet
          aws configure set aws_access_key_id "$R2_ACCESS_KEY"
          aws configure set aws_secret_access_key "$R2_SECRET_KEY"
          aws configure set region auto

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          for file in artifacts/*; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            aws s3 cp "$file" "s3://${R2_BUCKET}/$filename" \
              --endpoint-url "$ENDPOINT"
          done

          echo "All artifacts uploaded to R2"

      - name: Upload release-info.json
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          FILES=$(ls artifacts/ | jq -R -s -c 'split("\n") | map(select(. != ""))')
          jq -n \
            --arg latest "${{ inputs.version }}" \
            --arg url "https://htmlclay.com/#downloads" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson files "$FILES" \
            '{latest: $latest, url: $url, date: $date, files: $files}' > htmlclay-release-info.json

          aws s3 cp htmlclay-release-info.json "s3://${R2_BUCKET}/htmlclay-release-info.json" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/json"

          echo "Uploaded htmlclay-release-info.json"
