name: CI

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -o htmlclay${{ runner.os == 'Windows' && '.exe' || '' }} .
        env:
          CGO_ENABLED: ${{ runner.os == 'macOS' && '1' || '0' }}
